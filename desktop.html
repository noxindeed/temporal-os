<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>temporal desktop</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Tahoma, Arial, sans-serif;
  font-size: 11px;
  background: #008080;
  width: 100vw; height: 100vh;
  overflow: hidden;
}
.win {
  border-color: #dfdfdf #404040 #404040 #dfdfdf;
  box-shadow: 1px 1px 0 #808080;
}

.wbtns { display:flex; gap:2px; flex-shrink:0; }
.wbtn {
  width:16px; height:14px;
  background:#c0c0c0;
  border:1px solid;
  border-color:#dfdfdf #404040 #404040 #dfdfdf;
  font-size:8px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-family: monospace;
}
.wbtn:active {
  border-color:#404040 #dfdfdf #dfdfdf #404040;
  padding-top:1px;
}

.tbar {
  background: #000080;
  color: white;
  font-size: 11px;
  font-weight: bold;
  padding: 3px 5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 20px;
}
</style>
</head>
<body>
<div class="win" style="left:200px;top:100px;width:300px;">
  <div class="tbar">
    <span>My Computer</span>
    <div class="wbtns">
      <div class="wbtn">_</div>
      <div class="wbtn" style="font-size:9px">□</div>
      <div class="wbtn">×</div>
    </div>
  </div>
  <div style="padding:8px;">content here</div>
</div>
</body>
</html>
