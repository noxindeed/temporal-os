<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>temporal desktop</title>
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Tahoma, Arial, sans-serif;
  font-size: 11px;
  background: #008080;
  width: 100vw; height: 100vh;
  overflow: hidden;
}

.win {
  position: absolute;
  background: #c0c0c0;
  /* the 3d border needs 4 values not 2 */
  border: 2px solid;
  border-color: #dfdfdf #404040 #404040 #dfdfdf;
  box-shadow: 1px 1px 0 #808080;
  min-width: 180px;
}

.tbar {
  background: linear-gradient(90deg, #000080, #1084d0);
  color: white;
  font-size: 11px;
  font-weight: bold;
  padding: 3px 5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 20px;
}

.tbar.dim {
  background: linear-gradient(90deg, #7a7a7a, #ababab);
}

.wbtns { display:flex; gap:2px; flex-shrink:0; }
.wbtn {
  width: 16px; height: 14px;
  background: #c0c0c0;
  border: 1px solid;
  border-color: #dfdfdf #404040 #404040 #dfdfdf;
  font-size: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-family: monospace;
}
.wbtn:active {
  border-color: #404040 #dfdfdf #dfdfdf #404040;
  padding-top: 1px;
}

#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 30px;
  background: #c0c0c0;
  border-top: 2px solid #dfdfdf;
  display: flex; align-items: center;
  padding: 2px 3px; gap: 2px;
  z-index: 9000;
}

#startbtn {
  height: 24px; padding: 0 10px;
  background: #c0c0c0;
  border: 2px solid;
  border-color: #dfdfdf #404040 #404040 #dfdfdf;
  font-weight: bold; font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center;
  gap: 5px;
  font-family: Tahoma, sans-serif;
}

#startbtn.down {
  border-color: #404040 #dfdfdf #dfdfdf #404040;
  box-shadow: inset 1px 1px 0 #808080;
}

#tray {
  margin-left:auto;
  padding:0 8px;
  border:1px solid;
  border-color:#808080 #dfdfdf #dfdfdf #808080;
  height:22px;
  display:flex; align-items:center; gap:8px;
  font-size:11px; flex-shrink:0;
}

#smenu {
  position:fixed; bottom:30px; left:0;
  width:210px;
  background:#c0c0c0;
  border:2px solid;
  border-color:#dfdfdf #404040 #404040 #dfdfdf;
  z-index:9999;
  display:none; flex-direction:row;
}
#smenu.open { display:flex; }
.sm-strip {
  /* this took ages -- had to look up writing-mode */
  background: linear-gradient(to top, #000080, #1c44a0);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-size:17px; font-weight:bold;
  padding:8px 5px; letter-spacing:3px;
  font-family:'Arial Black',sans-serif;
  width:28px; flex-shrink:0;
}
.sm-rows { flex:1; display:flex; flex-direction:column; }
.sm-row {
  padding:6px 10px;
  display:flex; align-items:center; gap:8px;
  cursor:pointer; font-size:11px;
}
.sm-row:hover { background:#000080; color:white; }
.sm-sep {
  height:1px;
  background:#808080; margin:3px 6px;
  box-shadow:0 1px 0 #dfdfdf;
}
.icon {
  position:absolute; width:72px;
  display:flex; flex-direction:column;
  align-items:center; gap:3px;
  cursor:pointer; padding:4px;
  border:1px dotted transparent;
  user-select:none;
}
.icon.sel { border-color:white; background:rgba(0,0,128,.3); }
.icon svg { width:32px; height:32px; image-rendering:pixelated; }
.icon span {
  color:white; font-size:11px; text-align:center;
  text-shadow: 1px 1px #000,-1px 1px #000,1px -1px #000,-1px -1px #000;
  line-height:1.3; max-width:70px; word-break:break-word;
}
.notes-body {
  background:#fff; padding:4px 6px;
  font-family:'Courier New',monospace;
  font-size:12px; line-height:1.6;
  white-space:pre; overflow:auto;
  min-height:200px; outline:none;
  width:100%; resize:none;
}
.exp-body {
  padding:6px; background:#fff; display:flex; flex-wrap:wrap;
  gap:8px; align-content:flex-start;
  min-height:140px;
}
.exp-item {
  width:62px; display:flex; flex-direction:column;
  align-items:center; gap:3px;
  cursor:pointer; padding:4px;
  font-size:11px; text-align:center;
}
.exp-item:hover { background:#000080; color:white; }

</style>
</head>
<body>

<div class="win" style="left:200px;top:100px;width:300px;">
  <div class="tbar">
    <span>My Computer</span>
    <div class="wbtns">
      <div class="wbtn">_</div>
      <div class="wbtn" style="font-size:9px">□</div>
      <div class="wbtn">✕</div>
    </div>
  </div>
  <div style="padding:8px;">content here</div>
</div>
<div id="taskbar">
  <div id="startbtn">Start</div>
  <div id="tray"></div>
</div>

<!-- Desktop Icons -->
<div class="icon" style="left:20px;top:20px;">
  <!-- monitor icon -->
  <svg viewBox="0 0 16 16">
    <rect x="1" y="1" width="14" height="10" fill="#303030"/>
    <rect x="2" y="2" width="12" height="8" fill="#000070"/>
    <rect x="5" y="11" width="6" height="2" fill="#808080"/>
    <rect x="3" y="13" width="10" height="1" fill="#707070"/>
  </svg>
  <span>Monitor</span>
</div>

<div class="icon" style="left:100px;top:20px;">
  <!-- document icon -->
  <svg viewBox="0 0 16 16">
    <rect x="1" y="3" width="11" height="12" fill="#e0e080"/>
    <rect x="1" y="3" width="5" height="3" fill="#cccc00"/>
    <rect x="1" y="3" width="1" height="12" fill="#a0a000"/>
    <rect x="11" y="3" width="1" height="12" fill="#a0a000"/>
    <rect x="3" y="7" width="7" height="1" fill="#a0a000" opacity=".5"/>
    <rect x="3" y="9" width="7" height="1" fill="#a0a000" opacity=".5"/>
    <rect x="3" y="11" width="5" height="1" fill="#a0a000" opacity=".5"/>
  </svg>
  <span>Document</span>
</div>

<div class="icon" style="left:180px;top:20px;">
  <!-- hard disk icon -->
  <svg viewBox="0 0 16 16">
    <ellipse cx="8" cy="8" r="7" fill="#505050"/>
    <ellipse cx="8" cy="8" r="5" fill="#707070"/>
    <ellipse cx="8" cy="8" r="2" fill="#303030"/>
    <ellipse cx="8" cy="8" r="1" fill="#b0b0b0"/>
  </svg>
  <span>Hard Disk</span>
</div>

<div class="icon" style="left:260px;top:20px;">
  <!-- log file icon -->
  <svg viewBox="0 0 16 16">
    <rect x="2" y="0" width="12" height="16" fill="#000"/>
    <rect x="3" y="2" width="4" height="1" fill="#0f0"/>
    <rect x="3" y="4" width="7" height="1" fill="#0b0"/>
    <rect x="3" y="6" width="5" height="1" fill="#0f0"/>
    <rect x="3" y="8" width="8" height="1" fill="#070"/>
    <rect x="3" y="10" width="3" height="1" fill="#0f0"/>
  </svg>
  <span>Log File</span>
</div>

<div class="icon" style="left:340px;top:20px;">
  <!-- recycle bin icon -->
  <svg viewBox="0 0 16 16">
    <rect x="2" y="2" width="12" height="14" fill="#909090"/>
    <rect x="3" y="3" width="10" height="11" fill="#c0c0c0"/>
    <path d="M 5 5 L 7 11 M 8 5 L 8 11 M 11 5 L 9 11" stroke="#808080" stroke-width="1" fill="none"/>
  </svg>
  <span>Recycle Bin</span>
</div>

<script>
let smOpen = false;
function toggleStart() {
  smOpen = !smOpen;
  document.getElementById('smenu').classList.toggle('open', smOpen);
  document.getElementById('startbtn').classList.toggle('down', smOpen);
}
function closeStart() {
  smOpen = false;
  document.getElementById('smenu').classList.remove('open');
  document.getElementById('startbtn').classList.remove('down');
}
document.getElementById('startbtn').addEventListener('click', toggleStart);
document.addEventListener('click', e => {
  if (smOpen && !e.target.closest('#smenu,#startbtn')) closeStart();
});
let zTop = 100;
let focused = null;
let wins = {};

function show(id) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.classList.add('open');
  front(el);
  if (!wins[id]) { wins[id] = { min:false }; addtask(id); }
  else wins[id].min = false;
  focus(id);
}

function hide(id) {
  document.getElementById(id).style.display = 'none';
  document.getElementById(id).classList.remove('open');
  delete wins[id];
  rmtask(id);
  refocus();
}

function min(id) {
  document.getElementById(id).style.display = 'none';
  if (wins[id]) wins[id].min = true;
  refocus();
}

function front(el) { el.style.zIndex = ++zTop; }
// offset is wrong
let drag = { el:null };

function makedraggable(win) {
  win._drag = true;
  win.querySelector('.tbar').addEventListener('mousedown', e => {
    if (e.target.classList.contains('wbtn')) return;
    drag = {
      el: win,
      sx: e.clientX, sy: e.clientY,
      ox: win.offsetLeft, oy: win.offsetTop
    };
    e.preventDefault();
  });
}

document.addEventListener('mousemove', e => {
  if (!drag.el) return;
  drag.el.style.left = (drag.ox + e.clientX - drag.sx) + 'px';
  drag.el.style.top  = (drag.oy + e.clientY - drag.sy) + 'px';
});
document.addEventListener('mouseup', () => drag.el = null);

const tlabels = {
  'win-comp': 'My Computer',
  'win-notes': 'journal.txt',
  'win-log': 'system.log',
  'win-bin': 'Recycle Bin',
  'win-about': 'About'
};

function focus(id) {
  if (focused && focused !== id) {
    document.getElementById(focused)?.querySelector('.tbar')?.classList.add('dim');
  }
  focused = id;
  document.getElementById(id)?.querySelector('.tbar')?.classList.remove('dim');
  document.querySelectorAll('.tbtn').forEach(b => b.classList.toggle('on', b.dataset.id === id));
}

function refocus() {
  let best = -1, bestId = null;
  document.querySelectorAll('.win,.dlg').forEach(w => {
    if (w.style.display !== 'none') {
      const z = parseInt(w.style.zIndex) || 0;
      if (z > best) { best = z; bestId = w.id; }
    }
  });
  if (bestId) focus(bestId); else focused = null;
}

function addtask(id) {
  const b = document.createElement('div');
  b.className = 'tbtn';
  b.dataset.id = id;
  b.id = 'tb_' + id;
  b.textContent = tlabels[id] || id;
  b.onclick = () => {
    if (wins[id]?.min) { show(id); }
    else if (focused === id) { min(id); }
    else { front(document.getElementById(id)); focus(id); }
  };
  document.getElementById('tasklist').appendChild(b);
}

function rmtask(id) {
  document.getElementById('tb_' + id)?.remove();
}
const JOURNAL = `nov 14

had that dream again. the one with the hallway.
woke up at 3:17 and couldn't go back. made coffee
and watched the screensaver until it was light out.

bought a new monitor cable today. the old one was
giving me those lines on the left side of the screen.
hope that fixes it.

to do:
- call mum back
- finish the render before friday
- return that library book (overdue since october)

the machine has been running slow. defrag didn't help.
maybe it's the fan. sounds different than it used to.`;

document.getElementById('notepad').textContent = JOURNAL;

const logInit = [
  "[10:22:31] System initialized. All components OK.",
  "[10:22:32] Loading desktop environment...",
  "[10:22:33] Registry scan complete. No errors found.",
  "[10:22:34] Desktop loaded in 1.2s",
  "[10:24:11] Application launched: Notes.exe",
  { t: "[10:31:05] WARNING: Low memory. Available: 14MB", c: "#dd0" },
  "[10:31:06] Application closed: Notes.exe",
  { t: "[10:44:23] Disk read error on sector 0x3F2A. Retrying...", c: "#d80" },
  "[10:44:24] Disk read successful on retry.",
  { t: "[10:51:17] WARNING: Temperature threshold. CPU 71C", c: "#dd0" },
  "[10:55:02] System idle. Running background defrag.",
  "[10:58:44] Defrag complete. 3% contiguous.",
  "[11:03:10] Application launched: System.log"
];

const logbox = document.getElementById('logbox');
logInit.forEach(e => {
  const d = document.createElement('div');
  if (typeof e === 'string') d.textContent = e;
  else { d.textContent = e.t; d.style.color = e.c; }
  logbox.appendChild(d);
});

const t0 = Date.now();
const DECAY_SECS = 180;
let pct = 0;
let dead = false;

const JUNK = 'abcdef\u2591\u2592\u2593\u2588\u2584\u2580\u25a0\u25a1\u2190\u2192\u25c6\u2660\u2663\u25d9\u263a\u2665\u266a\u2022';

function mangle(str, rate) {
  if (rate <= 0) return str;
  return str.split('').map(c => c === ' ' || c === '\n' ? c : Math.random() < rate ? JUNK[Math.floor(Math.random()*JUNK.length)] : c).join('');
}

setInterval(tick, 500);

function tick() {
  if (dead) return;
  pct = Math.min(100, ((Date.now() - t0) / 1000 / DECAY_SECS) * 100);

}
// hardcoded 
const labelMap = [
  { id:'lbl-mycomp', orig:'My Computer' },
  { id:'lbl-docs',   orig:'My Documents' },
  { id:'lbl-bin',    orig:'Recycle Bin' },
  
];

function tick() {
  pct = Math.min(100, ((Date.now() - t0) / 1000 / DECAY_SECS) * 100);
  if (pct > 12) {
    const rate = Math.pow((pct-12)/88, 2) * .55;
    labelMap.forEach(t => {
      const el = document.getElementById(t.id);
      if (el) el.textContent = mangle(t.orig, rate);
    });
  }
}








</script>

</body>
