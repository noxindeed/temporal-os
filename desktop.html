<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>temporal desktop</title>
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Tahoma, Arial, sans-serif;
  font-size: 11px;
  background: #008080;
  width: 100vw; height: 100vh;
  overflow: hidden;
}

.win {
  position: absolute;
  background: #c0c0c0;
  /* the 3d border needs 4 values not 2 */
  border: 2px solid;
  border-color: #dfdfdf #404040 #404040 #dfdfdf;
  box-shadow: 1px 1px 0 #808080;
  min-width: 180px;
}

.tbar {
  background: linear-gradient(90deg, #000080, #1084d0);
  color: white;
  font-size: 11px;
  font-weight: bold;
  padding: 3px 5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 20px;
}

.tbar.dim {
  background: linear-gradient(90deg, #7a7a7a, #ababab);
}

.wbtns { display:flex; gap:2px; flex-shrink:0; }
.wbtn {
  width: 16px; height: 14px;
  background: #c0c0c0;
  border: 1px solid;
  border-color: #dfdfdf #404040 #404040 #dfdfdf;
  font-size: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-family: monospace;
}
.wbtn:active {
  border-color: #404040 #dfdfdf #dfdfdf #404040;
  padding-top: 1px;
}

#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 30px;
  background: #c0c0c0;
  border-top: 2px solid #dfdfdf;
  display: flex; align-items: center;
  padding: 2px 3px; gap: 2px;
  z-index: 9000;
}

#startbtn {
  height: 24px; padding: 0 10px;
  background: #c0c0c0;
  border: 2px solid;
  border-color: #dfdfdf #404040 #404040 #dfdfdf;
  font-weight: bold; font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center;
  gap: 5px;
  font-family: Tahoma, sans-serif;
}

#startbtn.down {
  border-color: #404040 #dfdfdf #dfdfdf #404040;
  box-shadow: inset 1px 1px 0 #808080;
}

#tray {
  margin-left:auto;
  padding:0 8px;
  border:1px solid;
  border-color:#808080 #dfdfdf #dfdfdf #808080;
  height:22px;
  display:flex; align-items:center; gap:8px;
  font-size:11px; flex-shrink:0;
}

#smenu {
  position:fixed; bottom:30px; left:0;
  width:210px;
  background:#c0c0c0;
  border:2px solid;
  border-color:#dfdfdf #404040 #404040 #dfdfdf;
  z-index:9999;
  display:none; flex-direction:row;
}
#smenu.open { display:flex; }
.sm-strip {
  /* this took ages -- had to look up writing-mode */
  background: linear-gradient(to top, #000080, #1c44a0);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-size:17px; font-weight:bold;
  padding:8px 5px; letter-spacing:3px;
  font-family:'Arial Black',sans-serif;
  width:28px; flex-shrink:0;
}
.sm-rows { flex:1; display:flex; flex-direction:column; }
.sm-row {
  padding:6px 10px;
  display:flex; align-items:center; gap:8px;
  cursor:pointer; font-size:11px;
}
.sm-row:hover { background:#000080; color:white; }
.sm-sep {
  height:1px;
  background:#808080; margin:3px 6px;
  box-shadow:0 1px 0 #dfdfdf;
}
.icon {
  position:absolute; width:72px;
  display:flex; flex-direction:column;
  align-items:center; gap:3px;
  cursor:pointer; padding:4px;
  border:1px dotted transparent;
  user-select:none;
}
.icon.sel { border-color:white; background:rgba(0,0,128,.3); }
.icon svg { width:32px; height:32px; image-rendering:pixelated; }
.icon span {
  color:white; font-size:11px; text-align:center;
  text-shadow: 1px 1px #000,-1px 1px #000,1px -1px #000,-1px -1px #000;
  line-height:1.3; max-width:70px; word-break:break-word;
}

</style>
</head>
<body>

<div class="win" style="left:200px;top:100px;width:300px;">
  <div class="tbar">
    <span>My Computer</span>
    <div class="wbtns">
      <div class="wbtn">_</div>
      <div class="wbtn" style="font-size:9px">□</div>
      <div class="wbtn">✕</div>
    </div>
  </div>
  <div style="padding:8px;">content here</div>
</div>
<div id="taskbar">
  <div id="startbtn">Start</div>
  <div id="tray"></div>
</div>

<script>
let smOpen = false;
function toggleStart() {
  smOpen = !smOpen;
  document.getElementById('smenu').classList.toggle('open', smOpen);
  document.getElementById('startbtn').classList.toggle('down', smOpen);
}
function closeStart() {
  smOpen = false;
  document.getElementById('smenu').classList.remove('open');
  document.getElementById('startbtn').classList.remove('down');
}
document.getElementById('startbtn').addEventListener('click', toggleStart);
document.addEventListener('click', e => {
  if (smOpen && !e.target.closest('#smenu,#startbtn')) closeStart();
});
</script>

</body>
</html>
